    <link rel="stylesheet" href="dither-ui.css">
    <style>
        @font-face {
            font-family: 'Chicago';
            src: url('https://cdn.jsdelivr.net/gh/nicokimmel/chicago-pixel-font@main/Chicago.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Chicago', 'VT323', 'Geneva', monospace;
            font-size: 13px;
            background-color: #a8a8a8;
            background-image:
                linear-gradient(45deg, #999 25%, transparent 25%),
                linear-gradient(-45deg, #999 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #999 75%),
                linear-gradient(-45deg, transparent 75%, #999 75%);
            background-size: 4px 4px;
            background-position: 0 0, 0 2px, 2px -2px, -2px 0;
            color: #000;
            cursor: default;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
            image-rendering: pixelated;
            user-select: none;
        }

        ::selection { background: #000; color: #fff; }

        .menu-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            background: #fff;
            border-bottom: 2px solid #000;
            height: 22px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 16px;
            font-size: 13px;
            font-weight: bold;
        }
        .menu-bar .logo { height: 16px; width: auto; padding: 2px 4px; image-rendering: auto; }
        .menu-bar .separator {
            width: 1px;
            height: 14px;
            background: #000;
            flex-shrink: 0;
        }
        .menu-bar .taskbar-items {
            display: flex;
            align-items: center;
            gap: 2px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .menu-bar .taskbar-item {
            padding: 2px 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .menu-bar .taskbar-item:hover {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .menu-bar .taskbar-item.active {
            background: #000;
            color: #fff;
        }
        .menu-bar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .menu-bar .clock {
            font-weight: bold;
            font-size: 12px;
            padding-right: 2px;
            flex-shrink: 0;
        }
        .lang-btn {
            padding: 1px 7px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            font-family: inherit;
            color: #000;
        }
        .lang-btn:hover {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .lang-btn.active {
            background: #000;
            color: #fff;
        }

        .desktop {
            position: fixed;
            top: 22px; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        .desktop-icons {
            position: absolute;
            top: 20px;
            right: 28px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
            max-width: min(132px, calc(100vw - 40px));
        }

        .desktop-icons-journey {
            position: absolute;
            bottom: 28px;
            left: 28px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
            max-width: min(132px, calc(100vw - 40px));
        }

        .desktop-icon-companion .icon-label {
            max-width: 118px;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            width: 100%;
            max-width: 118px;
            min-width: 72px;
            padding: 4px 2px;
            border: 2px solid transparent;
            box-sizing: border-box;
        }
        .desktop-icon:active .icon-img,
        .desktop-icon.selected .icon-img {
            filter: invert(1);
        }
        .desktop-icon:active .icon-label,
        .desktop-icon.selected .icon-label {
            background: #000;
            color: #fff;
        }

        .icon-img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
        }

        .icon-label {
            font-size: 12px;
            text-align: center;
            padding: 1px 2px;
            white-space: normal;
            line-height: 1.2;
            font-weight: bold;
            max-width: 118px;
            overflow-wrap: break-word;
            word-wrap: break-word;
            hyphens: auto;
        }

        .app-window {
            position: absolute;
            background: #fff;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            min-height: 300px;
        }

        .app-title-bar {
            height: 22px;
            background: #fff;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            padding: 0 4px;
            position: relative;
            cursor: grab;
            flex-shrink: 0;
        }
        .app-title-bar:active { cursor: grabbing; }

        /* Полоски title bar: те же inset’ы, что во встроенных приложениях (.title-bar-lines) */
        .app-title-bar-lines {
            position: absolute;
            left: 4px;
            right: 4px;
            top: 3px;
            bottom: 3px;
            z-index: 0;
            background: repeating-linear-gradient(to bottom, #000 0px, #000 1px, #fff 1px, #fff 3px);
        }

        /* Белая подложка под кнопками: перекрывает полоски по высоте и с запасом справа */
        .app-title-bar-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            align-self: stretch;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            background: #fff;
            padding: 0 12px 0 0;
        }

        .app-title-text {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 1;
            display: flex;
            align-items: center;
            background: #fff;
            padding: 0 10px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            max-width: calc(100% - 100px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-close-box {
            width: 14px;
            height: 14px;
            border: 2px solid #000;
            background: #fff;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            cursor: pointer;
        }
        .app-close-box::before,
        .app-close-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 2px;
            background: #000;
        }
        .app-close-box::before { transform: translate(-50%, -50%) rotate(45deg); }
        .app-close-box::after { transform: translate(-50%, -50%) rotate(-45deg); }
        .app-close-box:hover { background: #000; }
        .app-close-box:hover::before,
        .app-close-box:hover::after { background: #fff; }
        .app-close-box:active { background: #000; }

        .app-maximize-box {
            width: 14px;
            height: 14px;
            border: 2px solid #000;
            background: #fff;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            cursor: pointer;
        }
        .app-maximize-box::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            bottom: 1px;
            border: 1px solid #000;
        }
        .app-maximize-box:hover { background: #000; }
        .app-maximize-box:hover::after { border-color: #fff; }
        .app-maximize-box:active { background: #000; }

        .app-window.maximized {
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            height: 100% !important;
            box-shadow: none;
        }
        .app-window.maximized .app-resize-handle { display: none; }

        .app-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .app-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .app-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            z-index: 5;
            background:
                linear-gradient(135deg, transparent 30%, #000 30%, #000 35%, transparent 35%,
                transparent 45%, #000 45%, #000 50%, transparent 50%,
                transparent 60%, #000 60%, #000 65%, transparent 65%,
                transparent 75%, #000 75%, #000 80%, transparent 80%);
        }

        .inactive .app-title-bar-lines { opacity: 0; }
    </style>
</head>

    <script src="i18n.js"></script>
    <script>
    (async function () {
        const desktop = document.getElementById('desktop');
        const menuClock = document.getElementById('menu-clock');

        let windows = {};
        let topZ = 10;

        /** Окно не уезжает целиком: в зоне desktop остаётся полоска шапки для перетаскивания */
        const WIN_BORDER_TOP = 2;
        const TITLE_BAR_H = 22;
        const MIN_TITLE_GRAB_W = 80;
        const MIN_TITLE_VISIBLE_H = 10;

        function clampWindowToDesktop(win, left, top) {
            const dw = Math.max(0, desktop.clientWidth);
            const dh = Math.max(0, desktop.clientHeight);
            const w = Math.max(1, win.offsetWidth);
            const needX = Math.min(MIN_TITLE_GRAB_W, w, dw || 1);
            const titleTopInset = WIN_BORDER_TOP;
            const needY = Math.min(MIN_TITLE_VISIBLE_H, TITLE_BAR_H, dh || 1);
            const l = Math.max(needX - w, Math.min(left, dw - needX));
            const t = Math.max(
                needY - titleTopInset - TITLE_BAR_H,
                Math.min(top, dh - needY - titleTopInset)
            );
            win.style.left = l + 'px';
            win.style.top = t + 'px';
        }

        function clampWindowPosition(win) {
            if (!win || win.classList.contains('maximized')) return;
            const left = parseInt(win.style.left, 10);
            const top = parseInt(win.style.top, 10);
            clampWindowToDesktop(win, Number.isFinite(left) ? left : 0, Number.isFinite(top) ? top : 0);
        }

        const appConfig = {
            audio: { titleKey: 'app.titleAudio', src: 'AudioEditor.html', w: 1050, h: 650 },
            image: { titleKey: 'app.titleImage', src: 'ImageConverter.html', w: 950, h: 700 },
            brief: { titleKey: 'app.titleBrief', src: 'BriefEditor.html', w: 1100, h: 760 },
            tasks: { titleKey: 'app.titleTasks', src: 'Tasks.html', w: 700, h: 600 },
            video: { titleKey: 'app.titleVideo', src: 'VideoEditor.html', w: 900, h: 650 },
            about: { titleKey: 'app.titleAbout', src: 'About.html', w: 440, h: 400, noResize: true, noMaximize: true, centered: true }
        };

        function appTitle(appId) {
            const cfg = appConfig[appId];
            return cfg ? I18n.t(cfg.titleKey) : '';
        }

        function broadcastLangToIframes(lang) {
            document.querySelectorAll('.app-body iframe').forEach((f) => {
                try {
                    f.contentWindow.postMessage({ type: I18n.MSG_TYPE, lang }, '*');
                } catch (e) { /* ignore */ }
            });
        }

        function syncLangButtons() {
            const l = I18n.getLang();
            const en = document.getElementById('lang-en');
            const ru = document.getElementById('lang-ru');
            if (en) en.classList.toggle('active', l === 'en');
            if (ru) ru.classList.toggle('active', l === 'ru');
        }

        function refreshShellI18n() {
            I18n.applyTo(document.body);
            document.title = I18n.t('shell.pageTitle');
            for (const id in windows) {
                const el = windows[id].querySelector('.app-title-text');
                if (el) el.textContent = appTitle(id);
            }
            renderTaskbar();
            syncLangButtons();
            broadcastLangToIframes(I18n.getLang());
        }

        function setupLangSwitcher() {
            const en = document.getElementById('lang-en');
            const ru = document.getElementById('lang-ru');
            if (en) {
                en.addEventListener('click', () => {
                    I18n.setLang('en').then(refreshShellI18n);
                });
            }
            if (ru) {
                ru.addEventListener('click', () => {
                    I18n.setLang('ru').then(refreshShellI18n);
                });
            }
        }

        function openApp(appId) {
            if (windows[appId]) {
                bringToFront(appId);
                return;
            }

            const cfg = appConfig[appId];
            const win = document.createElement('div');
            win.className = 'app-window';
            win.dataset.appId = appId;

            const desktopRect = desktop.getBoundingClientRect();
            let x, y;
            if (cfg.centered) {
                x = Math.max(0, (desktopRect.width - cfg.w) / 2);
                y = Math.max(0, (desktopRect.height - cfg.h) / 2);
            } else {
                x = Math.max(20, (desktopRect.width - cfg.w) / 2 + (Object.keys(windows).length * 30));
                y = Math.max(10, (desktopRect.height - cfg.h) / 2 + (Object.keys(windows).length * 30));
            }

            win.style.left = x + 'px';
            win.style.top = y + 'px';
            win.style.width = cfg.w + 'px';
            win.style.height = cfg.h + 'px';
            win.style.zIndex = ++topZ;
            if (cfg.noResize) {
                win.style.minWidth = cfg.w + 'px';
                win.style.minHeight = cfg.h + 'px';
            }

            const maximizeBtn = cfg.noMaximize ? '' : `<div class="app-maximize-box" data-app="${appId}"></div>`;
            const resizeHandle = cfg.noResize ? '' : `<div class="app-resize-handle" data-app="${appId}"></div>`;

            win.innerHTML = `
                <div class="app-title-bar">
                    <div class="app-title-bar-controls">
                        <div class="app-close-box" data-app="${appId}"></div>
                        ${maximizeBtn}
                    </div>
                    <div class="app-title-bar-lines"></div>
                    <div class="app-title-text">${appTitle(appId)}</div>
                </div>
                <div class="app-body">
                    <iframe src="${cfg.src}"></iframe>
                </div>
                ${resizeHandle}
            `;

            desktop.appendChild(win);
            windows[appId] = win;
            clampWindowPosition(win);

            setupWindowDrag(win, appId);
            if (!cfg.noResize) setupWindowResize(win, appId);
            bringToFront(appId);

            win.querySelector('.app-close-box').addEventListener('click', (e) => {
                e.stopPropagation();
                closeApp(appId);
            });

            const maxBox = win.querySelector('.app-maximize-box');
            if (maxBox) {
                maxBox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMaximize(appId);
                });
            }

            win.querySelector('.app-title-bar').addEventListener('dblclick', (e) => {
                if (e.target.classList.contains('app-close-box') || e.target.classList.contains('app-maximize-box')) return;
                if (!cfg.noMaximize) toggleMaximize(appId);
            });

            win.addEventListener('mousedown', () => bringToFront(appId));

            renderTaskbar();
        }

        window.openApp = openApp;

        function closeApp(appId) {
            if (!windows[appId]) return;
            windows[appId].remove();
            delete windows[appId];
            updateWindowStates();
            renderTaskbar();
        }

        function toggleMaximize(appId) {
            const win = windows[appId];
            if (!win) return;

            if (win.classList.contains('maximized')) {
                win.classList.remove('maximized');
                const saved = win._savedRect;
                if (saved) {
                    win.style.left = saved.left;
                    win.style.top = saved.top;
                    win.style.width = saved.width;
                    win.style.height = saved.height;
                    clampWindowPosition(win);
                }
            } else {
                win._savedRect = {
                    left: win.style.left,
                    top: win.style.top,
                    width: win.style.width,
                    height: win.style.height
                };
                win.classList.add('maximized');
            }
            bringToFront(appId);
        }

        function bringToFront(appId) {
            if (!windows[appId]) return;
            windows[appId].style.zIndex = ++topZ;
            updateWindowStates();
        }

        function updateWindowStates() {
            let maxZ = 0;
            let frontId = null;
            for (const id in windows) {
                const z = parseInt(windows[id].style.zIndex) || 0;
                if (z > maxZ) { maxZ = z; frontId = id; }
            }
            for (const id in windows) {
                windows[id].classList.toggle('inactive', id !== frontId);
            }
            document.querySelectorAll('.taskbar-item').forEach(item => {
                item.classList.toggle('active', item.dataset.app === frontId);
            });
        }

        function renderTaskbar() {
            const container = document.getElementById('taskbar-items');
            container.innerHTML = '';
            for (const id in windows) {
                const item = document.createElement('span');
                item.className = 'taskbar-item';
                item.dataset.app = id;
                item.textContent = appTitle(id);
                item.addEventListener('click', () => bringToFront(id));
                container.appendChild(item);
            }
            updateWindowStates();
        }

        function setupWindowDrag(win, appId) {
            const titleBar = win.querySelector('.app-title-bar');
            let isDragging = false;
            let startX, startY, origX, origY;

            titleBar.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('app-close-box') || e.target.classList.contains('app-maximize-box')) return;
                if (win.classList.contains('maximized')) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                origX = parseInt(win.style.left);
                origY = parseInt(win.style.top);
                bringToFront(appId);
                disableIframes(true);
                e.preventDefault();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                clampWindowToDesktop(win, origX + dx, origY + dy);
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    disableIframes(false);
                }
            });
        }

        function setupWindowResize(win, appId) {
            const handle = win.querySelector('.app-resize-handle');
            let isResizing = false;
            let startX, startY, origW, origH;

            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                origW = win.offsetWidth;
                origH = win.offsetHeight;
                bringToFront(appId);
                disableIframes(true);
                e.preventDefault();
                e.stopPropagation();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                win.style.width = Math.max(400, origW + dx) + 'px';
                win.style.height = Math.max(300, origH + dy) + 'px';
            });

            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    disableIframes(false);
                    clampWindowPosition(win);
                }
            });
        }

        window.addEventListener('resize', () => {
            for (const id in windows) {
                clampWindowPosition(windows[id]);
            }
        });

        function disableIframes(disable) {
            document.querySelectorAll('.app-body iframe').forEach(f => {
                f.style.pointerEvents = disable ? 'none' : 'auto';
            });
        }

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes().toString().padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            menuClock.textContent = `${h12}:${m} ${ampm}`;
        }
        updateClock();
        setInterval(updateClock, 30000);

        await I18n.init();
        setupLangSwitcher();
        syncLangButtons();
        document.title = I18n.t('shell.pageTitle');

        if (localStorage.getItem('indietoolbox_hide_about') !== '1') {
            openApp('about');
        }
    })();
    </script>
</body>
</html>
