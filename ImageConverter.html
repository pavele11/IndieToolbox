<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.classList.add('i18n-pending');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Editor</title>
    <link rel="stylesheet" href="dither-ui.css">
    <style>
        @font-face {
            font-family: 'Chicago';
            src: url('https://cdn.jsdelivr.net/gh/nicokimmel/chicago-pixel-font@main/Chicago.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Chicago', 'VT323', 'Geneva', monospace;
            font-size: 13px;
            background: #c0c0c0;
            color: #000;
            min-height: 100vh;
            cursor: default;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: none;
        }

        .desktop {
            padding: 12px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .mac-window {
            background: #fff;
            border: 2px solid #000;
            margin-bottom: 12px;
            box-shadow: 2px 2px 0 #000;
        }

        .title-bar {
            height: 22px;
            background: #fff;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            padding: 0 4px;
            position: relative;
            user-select: none;
        }

        .title-bar-lines {
            position: absolute;
            left: 4px;
            right: 4px;
            top: 3px;
            bottom: 3px;
            z-index: 0;
            background: repeating-linear-gradient(to bottom, #000 0px, #000 1px, #fff 1px, #fff 3px);
        }

        .title-bar-text {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 1;
            display: flex;
            align-items: center;
            background: #fff;
            padding: 0 10px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            max-width: calc(100% - 48px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title-bar-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            align-self: stretch;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            background: #fff;
            padding: 0 12px 0 0;
        }

        .close-box {
            width: 14px;
            height: 14px;
            border: 2px solid #000;
            background: #fff;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            cursor: pointer;
        }
        .close-box::before,
        .close-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 2px;
            background: #000;
        }
        .close-box::before { transform: translate(-50%, -50%) rotate(45deg); }
        .close-box::after { transform: translate(-50%, -50%) rotate(-45deg); }
        .close-box:hover { background: #000; }
        .close-box:hover::before,
        .close-box:hover::after { background: #fff; }
        .close-box:active { background: #000; }

        .window-content { padding: 16px; }

        .upload-area {
            border: none;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            background: #fff;
            transition: box-shadow 0.15s;
        }
        .upload-area:hover {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .upload-area.dragover {
            background-color: #fff;
            background-image: var(--dither-dot-strong);
            background-size: var(--dither-step) var(--dither-step);
            box-shadow: inset 0 0 0 1px #000;
        }
        .upload-icon { font-size: 28px; margin-bottom: 6px; display: block; }

        .preview-wrap {
            border: 2px inset #888;
            background-color: #c0c0c0;
            background-image:
                linear-gradient(45deg, #b0b0b0 25%, transparent 25%),
                linear-gradient(-45deg, #b0b0b0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #b0b0b0 75%),
                linear-gradient(-45deg, transparent 75%, #b0b0b0 75%);
            background-size: 12px 12px;
            background-position: 0 0, 0 6px, 6px -6px, -6px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            max-height: 560px;
            overflow: visible;
            position: relative;
        }

        #preview-canvas {
            display: block;
            image-rendering: auto;
            position: relative;
            z-index: 0;
        }

        .markup-toolbar {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: none;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 8px;
            background: #fff;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
            max-width: calc(100% - 16px);
        }
        .markup-toolbar.is-visible { display: flex; }
        .markup-tool-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 1px 1px 0 #000;
        }
        .markup-tool-btn:hover {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .markup-tool-btn.active {
            background: #fff;
            color: #999;
            border-color: #999;
            box-shadow: 1px 1px 0 #bbb;
        }
        .markup-tool-btn svg { display: block; }
        .markup-tool-btn:not(.active) { color: #000; }
        .markup-toolbar-sep {
            width: 1px;
            height: 22px;
            background: #000;
            flex-shrink: 0;
        }
        .markup-toolbar label {
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        #markup-color {
            width: 28px;
            height: 28px;
            padding: 0;
            border: 2px solid #000;
            border-radius: 0;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 1px 1px 0 #000;
            background: #fff;
        }
        #markup-color::-webkit-color-swatch-wrapper {
            padding: 2px;
        }
        #markup-color::-webkit-color-swatch {
            border: none;
            border-radius: 0;
        }
        #markup-color::-moz-color-swatch {
            border: none;
        }
        .markup-toolbar input[type="range"] {
            width: 72px;
            accent-color: #000;
        }
        .markup-font-btns {
            display: none;
            align-items: center;
            gap: 3px;
            margin-left: 2px;
        }
        .markup-font-btns.is-visible { display: inline-flex; }
        .markup-font-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 1px 1px 0 #000;
            color: #000;
        }
        .markup-font-btn:hover {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .markup-font-btn:active { transform: translate(1px, 1px); box-shadow: none; }
        #markup-text-editor {
            display: none;
            position: absolute;
            z-index: 6;
            box-sizing: border-box;
            margin: 0;
            padding: 4px 5px;
            border: 2px solid #000;
            background: rgba(255, 255, 255, 0.96);
            font-family: 'Chicago', 'VT323', 'Geneva', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            resize: none;
            outline: none;
            overflow: hidden;
            line-height: 1.25;
        }
        #markup-text-editor:focus {
            box-shadow: 0 0 0 1px #000;
        }

        .crop-bar {
            display: flex;
            gap: 8px;
            padding: 10px 0 4px;
            align-items: center;
            border-bottom: 1px solid #ccc;
            margin-bottom: 8px;
        }
        .crop-bar .crop-hint {
            font-size: 11px;
            color: #555;
            margin-left: auto;
        }

        .info-row {
            font-size: 12px;
            padding: 10px 0 6px;
            border-bottom: 1px solid #ccc;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .info-row .label { color: #555; }

        .controls-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }
        .control-group-title {
            font-weight: bold;
            font-size: 12px;
            border-bottom: 1px solid #000;
            padding-bottom: 3px;
            margin-bottom: 8px;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .field-row label {
            white-space: nowrap;
            font-weight: bold;
        }
        .field-row input[type="number"] {
            font-family: 'Chicago', 'VT323', 'Geneva', monospace;
            font-size: 13px;
            width: 80px;
            border: 2px inset #888;
            background: #fff;
            padding: 3px 5px;
            outline: none;
        }
        .field-row input[type="number"]:focus { border-color: #000; }

        .field-row select {
            font-family: 'Chicago', 'VT323', 'Geneva', monospace;
            font-size: 13px;
            border: 2px inset #888;
            background: #fff;
            padding: 3px 5px;
            outline: none;
            cursor: pointer;
        }

        .field-row input[type="checkbox"] {
            margin-right: 2px;
        }

        .field-row input[type="range"] {
            width: 100px;
            accent-color: #000;
        }
        .quality-val {
            font-size: 12px;
            font-weight: bold;
            min-width: 30px;
        }

        .link-icon {
            font-size: 16px;
            line-height: 1;
            user-select: none;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 6px;
        }

        .mac-btn {
            font-family: 'Chicago', 'VT323', 'Geneva', monospace;
            font-size: 13px;
            padding: 5px 16px;
            border: 2px solid #000;
            border-radius: 0;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: var(--mac-push-shadow);
        }
        .mac-btn:hover:not(:disabled) {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .mac-btn:active:not(:disabled) {
            background: #000;
            color: #fff;
            box-shadow: none;
            transform: translate(2px, 2px);
        }
        /* Markup mode on: same visual weight as Crop while crop is active (disabled mac-btn), not thick default */
        .mac-btn.markup-mode-on {
            color: #999;
            border-color: #999;
            background: #fff;
            box-shadow: 1px 1px 0 #bbb;
            cursor: pointer;
        }
        .mac-btn.markup-mode-on:hover:not(:disabled) {
            background-color: #fff;
            background-image: var(--dither-dot-hover);
            background-size: var(--dither-step) var(--dither-step);
        }
        .mac-btn:disabled {
            color: #999;
            border-color: #999;
            cursor: default;
            background: #fff;
            box-shadow: 1px 1px 0 #bbb;
        }
        .mac-btn:disabled:hover {
            background: #fff;
            background-image: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 13px;
        }

        ::selection { background: #000; color: #fff; }
    </style>
</head>
<body>

    <div class="desktop">

        <div class="mac-window">
            <div class="title-bar">
                <div class="title-bar-lines"></div>
                <div class="title-bar-text" data-i18n="image.uploadTitleBar">Upload</div>
            </div>
            <div class="window-content">
                <div class="upload-area" id="upload-area">
                    <span class="upload-icon">&#128444;</span>
                    <div id="upload-line1" style="font-weight:bold;font-size:14px;margin-bottom:4px;" data-i18n="image.dropHere">Drop image here</div>
                    <div id="upload-line2" style="font-size:12px;color:#666;" data-i18n="image.dropHint">...or click to select a file</div>
                    <input type="file" id="fileInput" accept="image/*,.heic,.heif" style="display:none;">
                </div>
                <div style="text-align:center;margin-top:8px;">
                    <button class="mac-btn" onclick="pasteFromClipboard()">&#9112; <span data-i18n="image.pasteClipboard">Paste from clipboard</span></button>
                </div>
            </div>
        </div>

        <div class="mac-window" id="editor-window" style="display:none">
            <div class="title-bar">
                <div class="title-bar-controls">
                    <div class="close-box" onclick="resetAll()"></div>
                </div>
                <div class="title-bar-lines"></div>
                <div class="title-bar-text" id="editor-title">Untitled</div>
            </div>
            <div class="window-content">
                <div class="preview-wrap" id="preview-wrap">
                    <div class="markup-toolbar" id="markup-toolbar" data-i18n-aria-label="image.markupToolsAria" aria-label="Markup tools">
                        <button type="button" class="markup-tool-btn active" id="markup-tool-pencil" data-i18n-title="image.pencil" data-i18n-aria-label="image.pencil" title="Pencil" aria-label="Pencil">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path fill-rule="evenodd" clip-rule="evenodd" fill="currentColor" d="M18.3687 3.29001L20.7087 5.63C21.0988 6.01999 21.0988 6.64999 20.7087 7.04001L18.8788 8.87L15.1288 5.12L16.9587 3.29001C17.1487 3.10001 17.3987 3 17.6588 3C17.9188 3 18.1688 3.09 18.3687 3.29001ZM2.99875 17.25V21H6.74875L17.8087 9.94L14.0587 6.19L2.99875 17.25ZM5.91876 19H4.99875V18.08L14.0587 9.01999L14.9788 9.94L5.91876 19Z"/>
                            </svg>
                        </button>
                        <button type="button" class="markup-tool-btn" id="markup-tool-text" data-i18n-title="image.textBox" data-i18n-aria-label="image.text" title="Text box" aria-label="Text">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path fill="currentColor" d="M5 4.5V7.5H10.5V19.5H13.5V7.5H19V4.5H5Z"/>
                            </svg>
                        </button>
                        <button type="button" class="markup-tool-btn" id="markup-tool-eraser" data-i18n-title="image.eraser" data-i18n-aria-label="image.eraser" title="Eraser" aria-label="Eraser">
                            <svg width="18" height="18" viewBox="0 0 24 25" fill="none" aria-hidden="true">
                                <path fill="currentColor" d="M15 3L2 16L7 21H11.1L22 10.1L15 3ZM9.6 11.2L15 5.8L19.2 10L13.9 15.4L9.6 11.2Z"/>
                            </svg>
                        </button>
                        <span class="markup-font-btns" id="markup-font-btns" aria-hidden="true">
                            <button type="button" class="markup-font-btn" id="markup-font-dec" data-i18n-title="image.fontSmaller" data-i18n-aria-label="image.fontSmaller" title="Smaller text" aria-label="Smaller text"><svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path fill="currentColor" d="M1 5h10v2H1V5z"/></svg></button>
                            <button type="button" class="markup-font-btn" id="markup-font-inc" data-i18n-title="image.fontLarger" data-i18n-aria-label="image.fontLarger" title="Larger text" aria-label="Larger text"><svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path fill="currentColor" d="M5 1h2v4h4v2H7v4H5V7H1V5h4V1z"/></svg></button>
                        </span>
                        <span class="markup-toolbar-sep" aria-hidden="true"></span>
                        <input type="color" id="markup-color" value="#cc0000" data-i18n-title="image.colorTitle" data-i18n-aria-label="image.colorAria" title="Color (pencil, text &amp; new boxes)" aria-label="Color">
                        <label data-i18n-title="image.lineWidth" title="Line width">Ln <input type="range" id="markup-line-width" min="1" max="24" value="4"></label>
                        <label data-i18n-title="image.eraserSize" title="Eraser size">Er <input type="range" id="markup-eraser-size" min="4" max="48" value="16"></label>
                    </div>
                    <canvas id="preview-canvas"></canvas>
                    <textarea id="markup-text-editor" spellcheck="true" rows="1" data-i18n-aria-label="image.textNoteAria" aria-label="Text note"></textarea>
                </div>

                <div id="crop-bar" class="crop-bar" style="display:none;">
                    <button class="mac-btn" onclick="applyCrop()">&#10003; <span data-i18n="image.applyCrop">Apply Crop</span></button>
                    <button class="mac-btn" onclick="cancelCrop()">&#10005; <span data-i18n="image.cancelCrop">Cancel</span></button>
                    <span class="crop-hint" data-i18n="image.cropHint">Drag corners to resize &bull; drag inside to move</span>
                </div>

                <div class="info-row" id="info-row">
                    <span class="label" data-i18n="image.labelOriginal">Original:</span> <span id="info-original">—</span>
                    &nbsp;&nbsp;
                    <span class="label" data-i18n="image.labelCurrent">Current:</span> <span id="info-current">—</span>
                </div>

                <div class="controls-row">
                    <div class="control-group">
                        <div class="control-group-title" data-i18n="image.groupResize">Resize</div>
                        <div class="field-row">
                            <label data-i18n="image.labelW">W:</label>
                            <input type="number" id="out-width" min="1" max="16000">
                            <span class="link-icon" id="link-icon" data-i18n-title="image.linkLocked" title="Aspect ratio locked">&#9741;</span>
                            <label data-i18n="image.labelH">H:</label>
                            <input type="number" id="out-height" min="1" max="16000">
                        </div>
                        <div class="field-row">
                            <label><input type="checkbox" id="keep-aspect" checked> <span data-i18n="image.keepProportions">Keep proportions</span></label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-group-title" data-i18n="image.groupOutput">Output</div>
                        <div class="field-row">
                            <label data-i18n="image.labelFormat">Format:</label>
                            <select id="out-format">
                                <option value="image/png">PNG</option>
                                <option value="image/jpeg">JPEG</option>
                                <option value="image/webp">WebP</option>
                                <option value="image/bmp">BMP</option>
                            </select>
                        </div>
                        <div class="field-row" id="quality-row">
                            <label data-i18n="image.labelQuality">Quality:</label>
                            <input type="range" id="out-quality" min="1" max="100" value="92" oninput="document.getElementById('quality-val').textContent=this.value+'%'">
                            <span class="quality-val" id="quality-val">92%</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="mac-btn" onclick="enterCropMode()" id="btn-crop">&#9986; <span data-i18n="image.btnCrop">Crop</span></button>
                    <button class="mac-btn" id="btn-markup" onclick="toggleMarkupMode()">&#9998; <span data-i18n="image.btnMarkup">Markup</span></button>
                    <button class="mac-btn" onclick="resetImage()">&#8634; <span data-i18n="image.btnReset">Reset</span></button>
                    <button class="mac-btn" onclick="copyCompositeToClipboard()">&#9112; <span data-i18n="image.btnCopy">Copy to clipboard</span></button>
                    <button class="mac-btn" onclick="downloadImage()">&#8615; <span data-i18n="image.btnDownload">Download</span></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="i18n.js"></script>
    <script>
        let originalImage = null;
        let originalFileName = '';
        let originalFileSize = 0;
        let originalFileHandle = null;
        let workCanvas = document.createElement('canvas');
        let workCtx = workCanvas.getContext('2d');

        let displayScale = 1;
        let cropActive = false;
        let cropRect = { x: 0, y: 0, w: 0, h: 0 };
        let dragType = null;
        let dragStart = null;
        let antOffset = 0;
        let antRAF = null;

        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('fileInput');

        const HANDLE_SIZE = 7;
        const HANDLE_HIT = 12;

        // ================ MARKUP (annotations on image) ================

        let markupActive = false;
        let markupTool = 'pencil';
        let markupCanvas = document.createElement('canvas');
        let markupCtx = markupCanvas.getContext('2d');
        let textAnnotations = [];
        let selectedTextId = null;
        let markupDefaultTextBaseSize = 14;

        let markupLineLast = null;
        let markupDrawing = false;
        let markupErasing = false;
        let textDragStart = null;
        let textPendingRect = null;
        let moveTextState = null;
        let resizeTextState = null;

        const markupToolbar = document.getElementById('markup-toolbar');
        const btnMarkup = document.getElementById('btn-markup');
        const markupTextEditor = document.getElementById('markup-text-editor');
        let textEditAnnId = null;

        const MARKUP_TITLE_PATH = 'M5 4.5V7.5H10.5V19.5H13.5V7.5H19V4.5H5Z';
        const MARKUP_CURSOR_TEXT = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">'
            + '<path fill="#fff" stroke="#000" stroke-width="1" stroke-linejoin="round" d="'
            + MARKUP_TITLE_PATH + '"/></svg>'
        );

        let markupLastPointerInImage = null;

        /** diameter in work (image) pixels; shown on preview scaled by displayScale */
        function buildMarkupBrushCursorUrl(diameterWork) {
            const dPx = Math.max(1, diameterWork * displayScale);
            const strokeW = 1;
            const pad = 3;
            let r = dPx / 2;
            let size = Math.ceil(2 * r + strokeW * 2 + pad * 2);
            size = Math.min(128, Math.max(12, size));
            const maxR = size / 2 - strokeW - 1.5;
            r = Math.min(r, maxR);
            r = Math.max(0.5, r);
            const cx = size / 2;
            const cy = size / 2;
            const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="rgba(255,255,255,0.45)" stroke="#000" stroke-width="' + strokeW + '"/></svg>';
            return {
                url: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
                hx: Math.floor(cx),
                hy: Math.floor(cy)
            };
        }

        function refreshMarkupBrushCursorFromSliders() {
            if (!markupActive || cropActive || !workCanvas.width || !markupLastPointerInImage) return;
            const p = markupLastPointerInImage;
            if (!isInsidePreviewImage(p.mx, p.my)) return;
            updateMarkupCursor(p.mx, p.my);
        }

        function syncMarkupFontControlsVisibility() {
            const wrap = document.getElementById('markup-font-btns');
            if (!wrap) return;
            const vis = markupActive && !cropActive && (markupTool === 'text' || !!textEditAnnId);
            wrap.classList.toggle('is-visible', vis);
            wrap.setAttribute('aria-hidden', vis ? 'false' : 'true');
        }

        function previewCanvasCssScale() {
            const r = previewCanvas.getBoundingClientRect();
            const cw = previewCanvas.width, ch = previewCanvas.height;
            const kx = cw > 0 ? r.width / cw : 1;
            const ky = ch > 0 ? r.height / ch : 1;
            return { kx, ky, k: (kx + ky) / 2 };
        }

        function bumpMarkupTextFont(delta) {
            if (!markupActive || cropActive || !workCanvas.width) return;
            const bumpAnn = (ann) => {
                if (!ann) return;
                ann.baseSize = snapMarkupPreset(Number(ann.baseSize) || MARKUP_BASE_FONT, delta);
            };
            if (textEditAnnId) {
                bumpAnn(textAnnotations.find((t) => t.id === textEditAnnId));
            } else if (markupTool === 'text' && selectedTextId) {
                bumpAnn(textAnnotations.find((t) => t.id === selectedTextId));
            } else if (markupTool === 'text') {
                markupDefaultTextBaseSize = snapMarkupPreset(Number(markupDefaultTextBaseSize) || MARKUP_BASE_FONT, delta);
                return;
            } else {
                return;
            }
            drawPreview();
            if (textEditAnnId) {
                syncMarkupTextEditorFont();
                syncTextEditorPosition();
            }
        }

        function syncTextEditorPosition() {
            if (!textEditAnnId || !markupTextEditor || markupTextEditor.style.display === 'none') return;
            const ann = textAnnotations.find(t => t.id === textEditAnnId);
            if (!ann) return;
            const previewWrap = document.getElementById('preview-wrap');
            const canvasRect = previewCanvas.getBoundingClientRect();
            const wrapRect = previewWrap.getBoundingClientRect();
            const { kx, ky } = previewCanvasCssScale();
            const P = CANVAS_PAD;
            const left = canvasRect.left - wrapRect.left + (P + ann.x * displayScale) * kx;
            const top = canvasRect.top - wrapRect.top + (P + ann.y * displayScale) * ky;
            markupTextEditor.style.left = left + 'px';
            markupTextEditor.style.top = top + 'px';
            markupTextEditor.style.width = Math.max(120, ann.w * displayScale * kx) + 'px';
            markupTextEditor.style.height = Math.max(28, ann.h * displayScale * ky) + 'px';
        }

        function syncMarkupTextEditorFont() {
            if (!textEditAnnId || markupTextEditor.style.display === 'none') return;
            const ann = textAnnotations.find((t) => t.id === textEditAnnId);
            if (!ann) return;
            const temp = { ...ann, text: (markupTextEditor.value !== undefined ? markupTextEditor.value : ann.text) || ' ' };
            const layout = getMarkupTextLayout(temp);
            const { k } = previewCanvasCssScale();
            const drawFont = layout.font * displayScale * k;
            markupTextEditor.style.fontSize = `${Math.max(4, drawFont)}px`;
            markupTextEditor.style.lineHeight = '1.25';
            markupTextEditor.style.padding = `${MARKUP_TEXT_PAD_Y * displayScale * k}px ${MARKUP_TEXT_PAD_X * displayScale * k}px`;
            markupTextEditor.style.boxSizing = 'border-box';
        }

        function finishTextEdit() {
            if (!textEditAnnId) {
                markupTextEditor.style.display = 'none';
                markupTextEditor.value = '';
                syncMarkupFontControlsVisibility();
                return;
            }
            const ann = textAnnotations.find(t => t.id === textEditAnnId);
            if (ann) {
                ann.text = markupTextEditor.value;
                if (!ann.text.trim()) {
                    textAnnotations = textAnnotations.filter(t => t.id !== ann.id);
                    if (selectedTextId === ann.id) selectedTextId = null;
                }
            }
            markupTextEditor.style.display = 'none';
            markupTextEditor.value = '';
            textEditAnnId = null;
            drawPreview();
            syncMarkupFontControlsVisibility();
        }

        function startTextEdit(ann) {
            if (!ann) return;
            textEditAnnId = ann.id;
            selectedTextId = ann.id;
            document.getElementById('markup-color').value = ann.color || '#cc0000';
            markupTextEditor.value = ann.text || '';
            markupTextEditor.style.color = ann.color || '#000';
            syncTextEditorPosition();
            markupTextEditor.style.display = 'block';
            syncMarkupTextEditorFont();
            syncMarkupFontControlsVisibility();
            requestAnimationFrame(() => {
                syncTextEditorPosition();
                syncMarkupTextEditorFont();
                markupTextEditor.focus();
                markupTextEditor.select();
            });
            drawPreview();
        }

        function updateMarkupCursor(mx, my) {
            if (!markupActive || cropActive || !workCanvas.width) return;
            const inside = isInsidePreviewImage(mx, my);
            if (inside) markupLastPointerInImage = { mx, my };
            if (markupTool === 'pencil' && inside) {
                const lw = parseInt(document.getElementById('markup-line-width').value, 10) || 4;
                const c = buildMarkupBrushCursorUrl(lw);
                previewCanvas.style.cursor = `url("${c.url}") ${c.hx} ${c.hy}, crosshair`;
            } else if (markupTool === 'eraser' && inside) {
                const es = parseInt(document.getElementById('markup-eraser-size').value, 10) || 16;
                const c = buildMarkupBrushCursorUrl(es);
                previewCanvas.style.cursor = `url("${c.url}") ${c.hx} ${c.hy}, crosshair`;
            } else if (markupTool === 'text' && inside) {
                if (textDragStart) {
                    previewCanvas.style.cursor = 'crosshair';
                } else if (resizeTextState) {
                    const rc = textResizeCornerCursor(resizeTextState.corner);
                    previewCanvas.style.cursor = rc || 'default';
                } else if (selectedTextId) {
                    const ann = textAnnotations.find(t => t.id === selectedTextId);
                    if (ann) {
                        const wpt = previewToWork(mx, my);
                        const wx = clamp(wpt.x, 0, workCanvas.width);
                        const wy = clamp(wpt.y, 0, workCanvas.height);
                        const corner = hitTextCorner(wx, wy, ann);
                        const rc = corner ? textResizeCornerCursor(corner) : null;
                        previewCanvas.style.cursor = rc || `url("${MARKUP_CURSOR_TEXT}") 5 5, default`;
                    } else {
                        previewCanvas.style.cursor = `url("${MARKUP_CURSOR_TEXT}") 5 5, default`;
                    }
                } else {
                    previewCanvas.style.cursor = `url("${MARKUP_CURSOR_TEXT}") 5 5, default`;
                }
            } else {
                previewCanvas.style.cursor = '';
            }
        }

        function syncMarkupCanvasSize() {
            if (!workCanvas.width) return;
            if (markupCanvas.width === workCanvas.width && markupCanvas.height === workCanvas.height) return;
            markupCanvas.width = workCanvas.width;
            markupCanvas.height = workCanvas.height;
        }

        function clearMarkupLayer() {
            textEditAnnId = null;
            markupTextEditor.style.display = 'none';
            markupTextEditor.value = '';
            textAnnotations = [];
            selectedTextId = null;
            markupDefaultTextBaseSize = MARKUP_BASE_FONT;
            textPendingRect = null;
            markupLineLast = null;
            markupDrawing = false;
            markupErasing = false;
            moveTextState = null;
            resizeTextState = null;
            if (markupCanvas.width) markupCtx.clearRect(0, 0, markupCanvas.width, markupCanvas.height);
        }

        function toggleMarkupMode() {
            markupActive = !markupActive;
            btnMarkup.classList.toggle('markup-mode-on', markupActive);
            markupToolbar.classList.toggle('is-visible', markupActive);
            if (!markupActive) {
                finishTextEdit();
                markupDrawing = false;
                markupErasing = false;
                textPendingRect = null;
                moveTextState = null;
                resizeTextState = null;
                selectedTextId = null;
                textEditAnnId = null;
                markupTextEditor.style.display = 'none';
                markupTextEditor.value = '';
                previewCanvas.style.cursor = '';
                markupLastPointerInImage = null;
            }
            drawPreview();
        }

        function setMarkupTool(tool) {
            markupTool = tool;
            document.getElementById('markup-tool-pencil').classList.toggle('active', tool === 'pencil');
            document.getElementById('markup-tool-text').classList.toggle('active', tool === 'text');
            document.getElementById('markup-tool-eraser').classList.toggle('active', tool === 'eraser');
            drawPreview();
            syncMarkupFontControlsVisibility();
        }

        document.getElementById('markup-tool-pencil').addEventListener('click', () => setMarkupTool('pencil'));
        document.getElementById('markup-tool-text').addEventListener('click', () => setMarkupTool('text'));
        document.getElementById('markup-tool-eraser').addEventListener('click', () => setMarkupTool('eraser'));

        document.getElementById('markup-line-width').addEventListener('input', refreshMarkupBrushCursorFromSliders);
        document.getElementById('markup-eraser-size').addEventListener('input', refreshMarkupBrushCursorFromSliders);

        document.getElementById('markup-color').addEventListener('input', function () {
            if (selectedTextId) {
                const a = textAnnotations.find(t => t.id === selectedTextId);
                if (a) {
                    a.color = this.value;
                    if (textEditAnnId === a.id) markupTextEditor.style.color = this.value;
                    drawPreview();
                }
            }
        });

        markupTextEditor.addEventListener('input', () => { syncMarkupTextEditorFont(); });
        markupTextEditor.addEventListener('blur', () => {
            requestAnimationFrame(() => {
                if (document.activeElement !== markupTextEditor) finishTextEdit();
            });
        });
        markupTextEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                e.preventDefault();
                markupTextEditor.blur();
            }
        });
        ['markup-font-inc', 'markup-font-dec'].forEach((id) => {
            const el = document.getElementById(id);
            if (!el) return;
            const delta = id === 'markup-font-inc' ? 1 : -1;
            el.addEventListener('mousedown', (e) => { e.preventDefault(); });
            el.addEventListener('click', (e) => { e.preventDefault(); bumpMarkupTextFont(delta); });
        });

        function previewToWork(mx, my) {
            const P = CANVAS_PAD;
            return {
                x: (mx - P) / displayScale,
                y: (my - P) / displayScale
            };
        }

        function workToPreview(wx, wy) {
            const P = CANVAS_PAD;
            return { x: wx * displayScale + P, y: wy * displayScale + P };
        }

        function hitTextAnnotation(wx, wy) {
            for (let i = textAnnotations.length - 1; i >= 0; i--) {
                const a = textAnnotations[i];
                if (wx >= a.x && wx <= a.x + a.w && wy >= a.y && wy <= a.y + a.h) return a;
            }
            return null;
        }

        const TEXT_HANDLE = 10;

        function hitTextCorner(wx, wy, ann) {
            const h = TEXT_HANDLE / displayScale;
            const x1 = ann.x, y1 = ann.y, x2 = ann.x + ann.w, y2 = ann.y + ann.h;
            if (Math.abs(wx - x1) < h && Math.abs(wy - y1) < h) return 'nw';
            if (Math.abs(wx - x2) < h && Math.abs(wy - y1) < h) return 'ne';
            if (Math.abs(wx - x1) < h && Math.abs(wy - y2) < h) return 'sw';
            if (Math.abs(wx - x2) < h && Math.abs(wy - y2) < h) return 'se';
            return null;
        }

        function textResizeCornerCursor(corner) {
            if (corner === 'nw' || corner === 'se') return 'nwse-resize';
            if (corner === 'ne' || corner === 'sw') return 'nesw-resize';
            return null;
        }

        function cropTextAnnotations(cx, cy, cw, ch) {
            const next = [];
            for (const ann of textAnnotations) {
                const ax2 = ann.x + ann.w;
                const ay2 = ann.y + ann.h;
                const ix1 = Math.max(ann.x, cx);
                const iy1 = Math.max(ann.y, cy);
                const ix2 = Math.min(ax2, cx + cw);
                const iy2 = Math.min(ay2, cy + ch);
                const iw = ix2 - ix1;
                const ih = iy2 - iy1;
                if (iw < 8 || ih < 8) continue;
                next.push({
                    id: ann.id,
                    x: ix1 - cx,
                    y: iy1 - cy,
                    w: iw,
                    h: ih,
                    text: ann.text,
                    color: ann.color,
                    baseSize: ann.baseSize != null ? ann.baseSize : MARKUP_BASE_FONT
                });
            }
            textAnnotations = next;
            if (!textAnnotations.some(t => t.id === selectedTextId)) selectedTextId = null;
        }

        function isInsidePreviewImage(mx, my) {
            const P = CANVAS_PAD;
            const cw = Math.round(workCanvas.width * displayScale);
            const ch = Math.round(workCanvas.height * displayScale);
            return mx >= P && my >= P && mx <= P + cw && my <= P + ch;
        }

        function wrapTextForAnn(ctx, text, maxW) {
            const t = (text || '').trim() || ' ';
            const words = t.split(/\s+/);
            const lines = [];
            let line = '';
            for (const word of words) {
                const test = line ? line + ' ' + word : word;
                if (ctx.measureText(test).width > maxW && line) {
                    lines.push(line);
                    line = word;
                } else line = test;
            }
            if (line) lines.push(line);
            return lines.length ? lines : [' '];
        }

        const markupMeasureCtx = document.createElement('canvas').getContext('2d');
        const MARKUP_BASE_FONT = 14;
        const MARKUP_FONT_PRESETS = [8, 9, 10, 11, 12, 14, 16, 18, 20, 22, 24, 28, 32, 36, 48];
        const MARKUP_MIN_W = 80;
        const MARKUP_MIN_H = 28;
        const MARKUP_TEXT_PAD_X = 6;
        const MARKUP_TEXT_PAD_Y = 5;

        function snapMarkupPreset(current, direction) {
            const cur = Number(current);
            const base = Number.isFinite(cur) && cur > 0 ? cur : MARKUP_BASE_FONT;
            if (direction > 0) {
                const next = MARKUP_FONT_PRESETS.find((p) => p > base);
                return next != null ? next : MARKUP_FONT_PRESETS[MARKUP_FONT_PRESETS.length - 1];
            }
            const prev = [...MARKUP_FONT_PRESETS].reverse().find((p) => p < base);
            return prev != null ? prev : MARKUP_FONT_PRESETS[0];
        }

        function getMarkupFontSize(ctx, ann, w, h) {
            const text = ann.text || ' ';
            const base = Math.max(10, Number(ann.baseSize) || MARKUP_BASE_FONT);
            ctx.font = `bold ${base}px "Chicago","VT323",Geneva,monospace`;
            const baseLines = wrapTextForAnn(ctx, text, Math.max(4, w - MARKUP_TEXT_PAD_X * 2));
            const baseLh = base * 1.25;
            const baseTh = baseLines.length * baseLh;
            const baseMw = Math.max(0, ...baseLines.map((l) => ctx.measureText(l).width));
            if (baseTh <= h - MARKUP_TEXT_PAD_Y * 2 && baseMw <= w - MARKUP_TEXT_PAD_X * 2) return base;
            let low = 4;
            let high = base;
            let best = low;
            for (let i = 0; i < 24; i++) {
                const mid = (low + high) / 2;
                ctx.font = `bold ${mid}px "Chicago","VT323",Geneva,monospace`;
                const lines = wrapTextForAnn(ctx, text, Math.max(4, w - MARKUP_TEXT_PAD_X * 2));
                const lh = mid * 1.25;
                const th = lines.length * lh;
                const mw = Math.max(0, ...lines.map((l) => ctx.measureText(l).width));
                if (th <= h - MARKUP_TEXT_PAD_Y * 2 && mw <= w - MARKUP_TEXT_PAD_X * 2) {
                    best = mid;
                    low = mid;
                } else high = mid;
            }
            return best;
        }

        function getMarkupTextLayout(ann) {
            const w = Math.max(MARKUP_MIN_W, Number(ann.w) || MARKUP_MIN_W);
            const h = Math.max(MARKUP_MIN_H, Number(ann.h) || MARKUP_MIN_H);
            const font = getMarkupFontSize(markupMeasureCtx, ann, w, h);
            markupMeasureCtx.font = `bold ${font}px "Chicago","VT323",Geneva,monospace`;
            const lines = wrapTextForAnn(markupMeasureCtx, ann.text || ' ', Math.max(4, w - MARKUP_TEXT_PAD_X * 2));
            return { w, h, font, lines };
        }

        function drawAnnotationText(ctx, ann, scaleX, scaleY, offX, offY) {
            const layout = getMarkupTextLayout(ann);
            const x = offX + ann.x * scaleX;
            const y = offY + ann.y * scaleY;
            const bw = layout.w * scaleX;
            const bh = layout.h * scaleY;
            const sFont = Math.min(scaleX, scaleY);
            const drawFont = layout.font * sFont;
            ctx.font = `bold ${drawFont}px "Chicago","VT323",Geneva,monospace`;
            ctx.save();
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, y, bw, bh);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.strokeRect(x + 0.5, y + 0.5, Math.max(0, bw - 1), Math.max(0, bh - 1));
            ctx.restore();
            ctx.fillStyle = ann.color || '#000';
            const lh = drawFont * 1.25;
            let ty = y + MARKUP_TEXT_PAD_Y * scaleY + drawFont;
            for (const line of layout.lines) {
                if (ty > y + bh) break;
                ctx.fillText(line, x + MARKUP_TEXT_PAD_X * scaleX, ty);
                ty += lh;
            }
        }

        function drawMarkupOverlayOnPreview(cw, ch) {
            const P = CANVAS_PAD;
            const imgW = workCanvas.width;
            const imgH = workCanvas.height;
            previewCtx.save();
            previewCtx.drawImage(markupCanvas, 0, 0, imgW, imgH, P, P, cw, ch);
            previewCtx.restore();
            for (const ann of textAnnotations) {
                if (ann.id === textEditAnnId) continue;
                drawAnnotationText(previewCtx, ann, displayScale, displayScale, P, P);
            }
            if (textPendingRect) {
                const r = textPendingRect;
                const a = workToPreview(r.x, r.y);
                const b = workToPreview(r.x + r.w, r.y + r.h);
                previewCtx.save();
                previewCtx.strokeStyle = '#000';
                previewCtx.setLineDash([4, 4]);
                previewCtx.strokeRect(Math.min(a.x, b.x), Math.min(a.y, b.y), Math.abs(b.x - a.x), Math.abs(b.y - a.y));
                previewCtx.restore();
            }
            if (selectedTextId && markupActive) {
                const ann = textAnnotations.find(t => t.id === selectedTextId);
                if (ann) {
                    const a = workToPreview(ann.x, ann.y);
                    const b = workToPreview(ann.x + ann.w, ann.y + ann.h);
                    const x = Math.min(a.x, b.x), y = Math.min(a.y, b.y);
                    const w = Math.abs(b.x - a.x), h = Math.abs(b.y - a.y);
                    previewCtx.save();
                    previewCtx.strokeStyle = '#000';
                    previewCtx.lineWidth = 1.5;
                    previewCtx.setLineDash([3, 3]);
                    previewCtx.strokeRect(x + 0.5, y + 0.5, w, h);
                    previewCtx.setLineDash([]);
                    const hs = 5;
                    previewCtx.fillStyle = '#fff';
                    previewCtx.strokeStyle = '#000';
                    [[x, y], [x + w, y], [x, y + h], [x + w, y + h]].forEach(([hx, hy]) => {
                        previewCtx.fillRect(hx - hs / 2, hy - hs / 2, hs, hs);
                        previewCtx.strokeRect(hx - hs / 2, hy - hs / 2, hs, hs);
                    });
                    previewCtx.restore();
                }
            }
        }

        function buildOutputCanvas(outW, outH) {
            if (textEditAnnId) {
                const live = textAnnotations.find(t => t.id === textEditAnnId);
                if (live) live.text = markupTextEditor.value;
            }
            const fmt = document.getElementById('out-format').value;
            const c = document.createElement('canvas');
            c.width = outW;
            c.height = outH;
            const ctx = c.getContext('2d');
            if (fmt === 'image/jpeg') {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, outW, outH);
            }
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            const sx = outW / workCanvas.width;
            const sy = outH / workCanvas.height;
            ctx.drawImage(workCanvas, 0, 0, outW, outH);
            ctx.drawImage(markupCanvas, 0, 0, outW, outH);
            for (const ann of textAnnotations) {
                drawAnnotationText(ctx, ann, sx, sy, 0, 0);
            }
            return c;
        }

        async function copyCompositeToClipboard() {
            if (!workCanvas.width) return;
            const w = workCanvas.width;
            const h = workCanvas.height;
            const c = buildOutputCanvas(w, h);
            const blob = await new Promise(r => c.toBlob(r, 'image/png'));
            if (!blob) {
                alert(I18n.t('image.alertClipboardBuild'));
                return;
            }
            try {
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            } catch (e) {
                console.error(e);
                alert(I18n.t('image.alertClipboardFail'));
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!markupActive || cropActive) return;
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedTextId && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    textAnnotations = textAnnotations.filter(t => t.id !== selectedTextId);
                    selectedTextId = null;
                    drawPreview();
                }
            }
        });

        // ================ UPLOAD ================

        uploadArea.addEventListener('click', async () => {
            if (window.showOpenFilePicker) {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'Images',
                            accept: { 'image/*': ['.png', '.jpg', '.jpeg', '.gif', '.bmp', '.webp', '.heic', '.heif', '.svg', '.ico', '.tiff'] }
                        }],
                        multiple: false
                    });
                    originalFileHandle = handle;
                    loadFile(await handle.getFile());
                } catch (e) {
                    if (e.name !== 'AbortError') console.error(e);
                }
            } else {
                fileInput.click();
            }
        });
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            originalFileHandle = null;
            const item = e.dataTransfer.items && e.dataTransfer.items[0];
            if (item && item.getAsFileSystemHandle) {
                try {
                    const handle = await item.getAsFileSystemHandle();
                    if (handle && handle.kind === 'file') {
                        originalFileHandle = handle;
                        loadFile(await handle.getFile());
                        return;
                    }
                } catch (_) {}
            }
            if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            originalFileHandle = null;
            if (e.target.files.length) loadFile(e.target.files[0]);
            e.target.value = '';
        });

        async function pasteFromClipboard() {
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    const imageType = item.types.find(t => t.startsWith('image/'));
                    if (imageType) {
                        const blob = await item.getType(imageType);
                        const ext = imageType.split('/')[1] || 'png';
                        const file = new File([blob], `clipboard.${ext}`, { type: imageType });
                        originalFileHandle = null;
                        loadFile(file);
                        return;
                    }
                }
                alert(I18n.t('image.alertNoImageClipboard'));
            } catch (e) {
                if (e.name !== 'NotAllowedError') console.error(e);
                alert(I18n.t('image.alertClipboardRead'));
            }
        }

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    if (blob) {
                        originalFileHandle = null;
                        loadFile(blob);
                    }
                    return;
                }
            }
        });

        function isHeic(file) {
            const name = file.name.toLowerCase();
            return name.endsWith('.heic') || name.endsWith('.heif')
                || file.type === 'image/heic' || file.type === 'image/heif';
        }

        async function loadFile(file) {
            const isImage = file.type.startsWith('image/') || isHeic(file);
            if (!isImage) { alert(I18n.t('image.alertNotImage')); return; }

            originalFileName = file.name;
            originalFileSize = file.size;

            let blob = file;
            if (isHeic(file)) {
                const ul1 = document.getElementById('upload-line1');
                uploadArea.querySelector('.upload-icon').textContent = '\u231B';
                if (ul1) ul1.textContent = I18n.t('image.convertingHeic');
                try {
                    blob = await heic2any({ blob: file, toType: 'image/png', quality: 1 });
                    if (Array.isArray(blob)) blob = blob[0];
                } catch (err) {
                    console.error(err);
                    alert(I18n.t('image.alertHeicFail'));
                    uploadArea.querySelector('.upload-icon').textContent = '\uD83D\uDDBC';
                    if (ul1) ul1.textContent = I18n.t('image.dropHere');
                    return;
                }
                uploadArea.querySelector('.upload-icon').textContent = '\uD83D\uDDBC';
                if (ul1) ul1.textContent = I18n.t('image.dropHere');
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    workCanvas.width = img.width;
                    workCanvas.height = img.height;
                    workCtx.drawImage(img, 0, 0);
                    initEditor();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(blob);
        }

        // ================ EDITOR INIT ================

        function initEditor() {
            cancelCrop();
            clearMarkupLayer();
            syncMarkupCanvasSize();
            document.getElementById('editor-window').style.display = 'block';
            document.getElementById('editor-title').textContent = originalFileName;

            updateInfo();
            syncDimensionInputs();
            onFormatChange();
            drawPreview();
        }

        function updateInfo() {
            const ow = originalImage.width, oh = originalImage.height;
            const cw = workCanvas.width, ch = workCanvas.height;
            const sizeStr = originalFileSize > 1048576
                ? (originalFileSize / 1048576).toFixed(1) + ' MB'
                : (originalFileSize / 1024).toFixed(1) + ' KB';

            document.getElementById('info-original').textContent = `${ow} \u00d7 ${oh}  \u2014  ${originalFileName}  (${sizeStr})`;
            document.getElementById('info-current').textContent = `${cw} \u00d7 ${ch}`;
        }

        function syncDimensionInputs() {
            document.getElementById('out-width').value = workCanvas.width;
            document.getElementById('out-height').value = workCanvas.height;
        }

        // ================ PREVIEW ================

        const CANVAS_PAD = 8;

        function drawPreview() {
            const wrap = document.getElementById('preview-wrap');
            const maxW = wrap.clientWidth - 4 - CANVAS_PAD * 2;
            const maxH = 520 - CANVAS_PAD * 2;
            const imgW = workCanvas.width;
            const imgH = workCanvas.height;

            if (imgW === 0 || imgH === 0) return;

            displayScale = Math.min(maxW / imgW, maxH / imgH, 2);
            const cw = Math.round(imgW * displayScale);
            const ch = Math.round(imgH * displayScale);

            previewCanvas.width = cw + CANVAS_PAD * 2;
            previewCanvas.height = ch + CANVAS_PAD * 2;
            previewCanvas.style.width = (cw + CANVAS_PAD * 2) + 'px';
            previewCanvas.style.height = (ch + CANVAS_PAD * 2) + 'px';

            previewCtx.imageSmoothingEnabled = true;
            previewCtx.drawImage(workCanvas, 0, 0, imgW, imgH, CANVAS_PAD, CANVAS_PAD, cw, ch);

            if (markupCanvas.width === imgW && markupCanvas.height === imgH) {
                drawMarkupOverlayOnPreview(cw, ch);
            }

            if (cropActive) drawCropOverlay(cw, ch);

            syncTextEditorPosition();
            if (textEditAnnId && markupTextEditor.style.display === 'block') syncMarkupTextEditorFont();
            syncMarkupFontControlsVisibility();
        }

        function drawCropOverlay(cw, ch) {
            const ctx = previewCtx;
            const P = CANVAS_PAD;
            const cr = {
                x: cropRect.x * displayScale + P,
                y: cropRect.y * displayScale + P,
                w: cropRect.w * displayScale,
                h: cropRect.h * displayScale
            };

            ctx.save();
            ctx.beginPath();
            ctx.rect(P, P, cw, ch);
            ctx.rect(cr.x + cr.w, cr.y, -cr.w, cr.h);
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.fill('evenodd');
            ctx.restore();

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.lineDashOffset = -antOffset;
            ctx.strokeRect(cr.x + 0.5, cr.y + 0.5, cr.w, cr.h);

            ctx.strokeStyle = '#fff';
            ctx.lineDashOffset = -antOffset + 5;
            ctx.strokeRect(cr.x + 0.5, cr.y + 0.5, cr.w, cr.h);
            ctx.setLineDash([]);

            const hs = HANDLE_SIZE;
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.5;
            const corners = [
                [cr.x, cr.y],
                [cr.x + cr.w, cr.y],
                [cr.x, cr.y + cr.h],
                [cr.x + cr.w, cr.y + cr.h]
            ];
            for (const [hx, hy] of corners) {
                ctx.fillRect(hx - hs / 2, hy - hs / 2, hs, hs);
                ctx.strokeRect(hx - hs / 2, hy - hs / 2, hs, hs);
            }

            const dimText = `${Math.round(cropRect.w)} \u00d7 ${Math.round(cropRect.h)}`;
            ctx.font = 'bold 12px "Chicago", "VT323", monospace';
            const tm = ctx.measureText(dimText);
            const tx = cr.x + cr.w / 2 - tm.width / 2;
            const ty = cr.y + cr.h + 16;
            if (ty < ch + P * 2 - 4) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(tx - 3, ty - 11, tm.width + 6, 14);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(tx - 3, ty - 11, tm.width + 6, 14);
                ctx.fillStyle = '#000';
                ctx.fillText(dimText, tx, ty);
            }
        }

        function animateCropAnts() {
            if (!cropActive) return;
            antOffset = (antOffset + 0.6) % 10;
            drawPreview();
            antRAF = requestAnimationFrame(animateCropAnts);
        }

        // ================ CROP TOOL ================

        function enterCropMode() {
            if (cropActive) return;
            finishTextEdit();
            markupDrawing = false;
            markupErasing = false;
            markupLineLast = null;
            textDragStart = null;
            textPendingRect = null;
            moveTextState = null;
            resizeTextState = null;
            cropActive = true;
            cropRect = { x: 0, y: 0, w: workCanvas.width, h: workCanvas.height };
            document.getElementById('crop-bar').style.display = 'flex';
            document.getElementById('btn-crop').disabled = true;
            antOffset = 0;
            animateCropAnts();
        }

        function applyCrop() {
            const cx = Math.round(Math.max(0, cropRect.x));
            const cy = Math.round(Math.max(0, cropRect.y));
            const cw = Math.round(Math.min(cropRect.w, workCanvas.width - cx));
            const ch = Math.round(Math.min(cropRect.h, workCanvas.height - cy));
            if (cw < 1 || ch < 1) { cancelCrop(); return; }

            const fullW = workCanvas.width;
            const fullH = workCanvas.height;

            const imageData = workCtx.getImageData(cx, cy, cw, ch);
            workCanvas.width = cw;
            workCanvas.height = ch;
            workCtx.putImageData(imageData, 0, 0);

            if (markupCanvas.width === fullW && markupCanvas.height === fullH) {
                const md = markupCtx.getImageData(cx, cy, cw, ch);
                markupCanvas.width = cw;
                markupCanvas.height = ch;
                markupCtx.putImageData(md, 0, 0);
            } else {
                syncMarkupCanvasSize();
            }
            cropTextAnnotations(cx, cy, cw, ch);

            cancelCrop();
            syncDimensionInputs();
            updateInfo();
            drawPreview();
        }

        function cancelCrop() {
            cropActive = false;
            dragType = null;
            dragStart = null;
            if (antRAF) { cancelAnimationFrame(antRAF); antRAF = null; }
            document.getElementById('crop-bar').style.display = 'none';
            document.getElementById('btn-crop').disabled = false;
            drawPreview();
        }

        function getCropHit(mx, my) {
            const P = CANVAS_PAD;
            const cr = {
                x: cropRect.x * displayScale + P,
                y: cropRect.y * displayScale + P,
                w: cropRect.w * displayScale,
                h: cropRect.h * displayScale
            };
            const h = HANDLE_HIT;
            if (near(mx, my, cr.x, cr.y, h)) return 'nw';
            if (near(mx, my, cr.x + cr.w, cr.y, h)) return 'ne';
            if (near(mx, my, cr.x, cr.y + cr.h, h)) return 'sw';
            if (near(mx, my, cr.x + cr.w, cr.y + cr.h, h)) return 'se';
            if (mx >= cr.x && mx <= cr.x + cr.w && my >= cr.y && my <= cr.y + cr.h) return 'move';
            return null;
        }

        function near(x1, y1, x2, y2, r) {
            return Math.abs(x1 - x2) < r && Math.abs(y1 - y2) < r;
        }

        function getCropCursor(type) {
            const map = { nw: 'nwse-resize', se: 'nwse-resize', ne: 'nesw-resize', sw: 'nesw-resize', move: 'move' };
            return map[type] || 'default';
        }

        function strokeEraser(wx, wy) {
            const r = (parseInt(document.getElementById('markup-eraser-size').value, 10) || 16) / 2;
            markupCtx.save();
            markupCtx.globalCompositeOperation = 'destination-out';
            markupCtx.beginPath();
            markupCtx.arc(wx, wy, Math.max(2, r), 0, Math.PI * 2);
            markupCtx.fill();
            markupCtx.restore();
        }

        function applyTextResize(ann, corner, s, dx, dy) {
            const MIN_W = MARKUP_MIN_W;
            const MIN_H = MARKUP_MIN_H;
            if (corner === 'se') {
                ann.x = s.x;
                ann.y = s.y;
                ann.w = clamp(s.w + dx, MIN_W, workCanvas.width - s.x);
                ann.h = clamp(s.h + dy, MIN_H, workCanvas.height - s.y);
            } else if (corner === 'ne') {
                const ny = clamp(s.y + dy, 0, s.y + s.h - MIN_H);
                ann.x = s.x;
                ann.y = ny;
                ann.w = clamp(s.w + dx, MIN_W, workCanvas.width - s.x);
                ann.h = s.y + s.h - ny;
            } else if (corner === 'sw') {
                const nx = clamp(s.x + dx, 0, s.x + s.w - MIN_W);
                ann.x = nx;
                ann.y = s.y;
                ann.w = s.x + s.w - nx;
                ann.h = clamp(s.h + dy, MIN_H, workCanvas.height - s.y);
            } else if (corner === 'nw') {
                const nx = clamp(s.x + dx, 0, s.x + s.w - MIN_W);
                const ny = clamp(s.y + dy, 0, s.y + s.h - MIN_H);
                ann.w = s.x + s.w - nx;
                ann.h = s.y + s.h - ny;
                ann.x = nx;
                ann.y = ny;
            }
        }

        previewCanvas.addEventListener('mousedown', (e) => {
            const rect = previewCanvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if (markupActive && !cropActive && textEditAnnId) finishTextEdit();

            if (cropActive) {
                const hit = getCropHit(mx, my);
                if (hit) {
                    dragType = hit;
                    dragStart = { mx, my, rect: { ...cropRect } };
                    e.preventDefault();
                }
                return;
            }

            if (markupActive && workCanvas.width && isInsidePreviewImage(mx, my)) {
                const wpt = previewToWork(mx, my);
                const wx = clamp(wpt.x, 0, workCanvas.width);
                const wy = clamp(wpt.y, 0, workCanvas.height);

                if (markupTool === 'pencil') {
                    markupDrawing = true;
                    markupLineLast = { x: wx, y: wy };
                    markupCtx.strokeStyle = document.getElementById('markup-color').value;
                    markupCtx.lineWidth = parseInt(document.getElementById('markup-line-width').value, 10) || 4;
                    markupCtx.lineCap = 'round';
                    markupCtx.lineJoin = 'round';
                    markupCtx.beginPath();
                    markupCtx.moveTo(wx, wy);
                    e.preventDefault();
                    return;
                }

                if (markupTool === 'eraser') {
                    markupErasing = true;
                    strokeEraser(wx, wy);
                    drawPreview();
                    e.preventDefault();
                    return;
                }

                if (markupTool === 'text') {
                    const sel = selectedTextId ? textAnnotations.find(t => t.id === selectedTextId) : null;
                    if (sel) {
                        const corner = hitTextCorner(wx, wy, sel);
                        if (corner) {
                            resizeTextState = {
                                id: sel.id,
                                corner,
                                startBox: { x: sel.x, y: sel.y, w: sel.w, h: sel.h },
                                wx0: wx,
                                wy0: wy
                            };
                            e.preventDefault();
                            return;
                        }
                        if (wx >= sel.x && wx <= sel.x + sel.w && wy >= sel.y && wy <= sel.y + sel.h) {
                            if (e.detail >= 2) {
                                startTextEdit(sel);
                                e.preventDefault();
                                return;
                            }
                            moveTextState = { id: sel.id, ox: wx - sel.x, oy: wy - sel.y };
                            e.preventDefault();
                            return;
                        }
                    }
                    const hit = hitTextAnnotation(wx, wy);
                    if (hit) {
                        if (e.detail >= 2) {
                            startTextEdit(hit);
                            e.preventDefault();
                            return;
                        }
                        selectedTextId = hit.id;
                        document.getElementById('markup-color').value = hit.color || '#cc0000';
                        drawPreview();
                        e.preventDefault();
                        return;
                    }
                    selectedTextId = null;
                    textDragStart = { x: wx, y: wy };
                    e.preventDefault();
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            const rect = previewCanvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if (markupActive && !cropActive && workCanvas.width) updateMarkupCursor(mx, my);

            const markupDragging = markupDrawing || markupErasing || textDragStart || moveTextState || resizeTextState;
            if (markupActive && !cropActive && workCanvas.width && (isInsidePreviewImage(mx, my) || markupDragging)) {
                const wpt = previewToWork(mx, my);
                const wx = clamp(wpt.x, 0, workCanvas.width);
                const wy = clamp(wpt.y, 0, workCanvas.height);

                if (markupDrawing && markupLineLast) {
                    markupCtx.strokeStyle = document.getElementById('markup-color').value;
                    markupCtx.lineWidth = parseInt(document.getElementById('markup-line-width').value, 10) || 4;
                    markupCtx.lineCap = 'round';
                    markupCtx.lineJoin = 'round';
                    markupCtx.beginPath();
                    markupCtx.moveTo(markupLineLast.x, markupLineLast.y);
                    markupCtx.lineTo(wx, wy);
                    markupCtx.stroke();
                    markupLineLast = { x: wx, y: wy };
                    drawPreview();
                    return;
                }
                if (markupErasing) {
                    strokeEraser(wx, wy);
                    drawPreview();
                    return;
                }
                if (textDragStart) {
                    textPendingRect = {
                        x: Math.min(textDragStart.x, wx),
                        y: Math.min(textDragStart.y, wy),
                        w: Math.abs(wx - textDragStart.x),
                        h: Math.abs(wy - textDragStart.y)
                    };
                    drawPreview();
                    return;
                }
                if (moveTextState) {
                    const ann = textAnnotations.find(t => t.id === moveTextState.id);
                    if (ann) {
                        ann.x = clamp(wx - moveTextState.ox, 0, workCanvas.width - ann.w);
                        ann.y = clamp(wy - moveTextState.oy, 0, workCanvas.height - ann.h);
                        drawPreview();
                    }
                    return;
                }
                if (resizeTextState) {
                    const ann = textAnnotations.find(t => t.id === resizeTextState.id);
                    if (ann) {
                        const s = resizeTextState.startBox;
                        const dx = wx - resizeTextState.wx0;
                        const dy = wy - resizeTextState.wy0;
                        ann.x = s.x;
                        ann.y = s.y;
                        ann.w = s.w;
                        ann.h = s.h;
                        applyTextResize(ann, resizeTextState.corner, s, dx, dy);
                        drawPreview();
                    }
                    return;
                }
            }

            if (!cropActive) return;

            if (dragType && dragStart) {
                const dx = (mx - dragStart.mx) / displayScale;
                const dy = (my - dragStart.my) / displayScale;
                const sr = dragStart.rect;
                const imgW = workCanvas.width;
                const imgH = workCanvas.height;
                const MIN = 10;

                if (dragType === 'move') {
                    cropRect.x = clamp(sr.x + dx, 0, imgW - sr.w);
                    cropRect.y = clamp(sr.y + dy, 0, imgH - sr.h);
                    cropRect.w = sr.w;
                    cropRect.h = sr.h;
                } else if (dragType === 'nw') {
                    const nx = clamp(sr.x + dx, 0, sr.x + sr.w - MIN);
                    const ny = clamp(sr.y + dy, 0, sr.y + sr.h - MIN);
                    cropRect.w = sr.x + sr.w - nx;
                    cropRect.h = sr.y + sr.h - ny;
                    cropRect.x = nx;
                    cropRect.y = ny;
                } else if (dragType === 'ne') {
                    const ny = clamp(sr.y + dy, 0, sr.y + sr.h - MIN);
                    cropRect.w = clamp(sr.w + dx, MIN, imgW - sr.x);
                    cropRect.h = sr.y + sr.h - ny;
                    cropRect.y = ny;
                } else if (dragType === 'sw') {
                    const nx = clamp(sr.x + dx, 0, sr.x + sr.w - MIN);
                    cropRect.w = sr.x + sr.w - nx;
                    cropRect.h = clamp(sr.h + dy, MIN, imgH - sr.y);
                    cropRect.x = nx;
                } else if (dragType === 'se') {
                    cropRect.w = clamp(sr.w + dx, MIN, imgW - sr.x);
                    cropRect.h = clamp(sr.h + dy, MIN, imgH - sr.y);
                }
            } else {
                const hit = getCropHit(mx, my);
                previewCanvas.style.cursor = getCropCursor(hit);
            }
        });

        window.addEventListener('mouseup', () => {
            if (markupDrawing) {
                markupDrawing = false;
                markupLineLast = null;
            }
            markupErasing = false;
            if (textDragStart && textPendingRect && textPendingRect.w > 8 && textPendingRect.h > 8) {
                const rw = Math.max(MARKUP_MIN_W, textPendingRect.w);
                const rh = Math.max(MARKUP_MIN_H, textPendingRect.h);
                const ann = {
                    id: Date.now(),
                    x: textPendingRect.x,
                    y: textPendingRect.y,
                    w: rw,
                    h: rh,
                    text: '',
                    color: document.getElementById('markup-color').value || '#cc0000',
                    baseSize: Number(markupDefaultTextBaseSize) || MARKUP_BASE_FONT
                };
                textAnnotations.push(ann);
                selectedTextId = ann.id;
                textDragStart = null;
                textPendingRect = null;
                requestAnimationFrame(() => startTextEdit(ann));
            } else {
                textDragStart = null;
                textPendingRect = null;
            }
            moveTextState = null;
            resizeTextState = null;
            dragType = null;
            dragStart = null;
            drawPreview();
        });

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        // ================ RESIZE ================

        document.getElementById('out-width').addEventListener('input', function () {
            const w = parseInt(this.value);
            if (!w || w < 1) return;
            if (document.getElementById('keep-aspect').checked) {
                const aspect = workCanvas.width / workCanvas.height;
                document.getElementById('out-height').value = Math.round(w / aspect);
            }
        });

        document.getElementById('out-height').addEventListener('input', function () {
            const h = parseInt(this.value);
            if (!h || h < 1) return;
            if (document.getElementById('keep-aspect').checked) {
                const aspect = workCanvas.width / workCanvas.height;
                document.getElementById('out-width').value = Math.round(h * aspect);
            }
        });

        document.getElementById('keep-aspect').addEventListener('change', function () {
            const icon = document.getElementById('link-icon');
            icon.textContent = this.checked ? '\u2605' : '\u2606';
            if (this.checked) {
                const w = parseInt(document.getElementById('out-width').value);
                if (w > 0) {
                    const aspect = workCanvas.width / workCanvas.height;
                    document.getElementById('out-height').value = Math.round(w / aspect);
                }
            }
        });

        // ================ FORMAT ================

        function onFormatChange() {
            const fmt = document.getElementById('out-format').value;
            const qRow = document.getElementById('quality-row');
            qRow.style.display = (fmt === 'image/jpeg' || fmt === 'image/webp') ? 'flex' : 'none';
        }
        document.getElementById('out-format').addEventListener('change', onFormatChange);

        // ================ RESET ================

        function resetImage() {
            if (!originalImage) return;
            cancelCrop();
            workCanvas.width = originalImage.width;
            workCanvas.height = originalImage.height;
            workCtx.drawImage(originalImage, 0, 0);
            clearMarkupLayer();
            syncMarkupCanvasSize();
            syncDimensionInputs();
            updateInfo();
            drawPreview();
        }

        function resetAll() {
            cancelCrop();
            originalImage = null;
            document.getElementById('editor-window').style.display = 'none';
        }

        // ================ DOWNLOAD ================

        async function downloadImage() {
            if (!workCanvas.width) return;

            const fmt = document.getElementById('out-format').value;
            const baseName = originalFileName.replace(/\.[^.]+$/, '') || 'image';
            const extMap = { 'image/png': '.png', 'image/jpeg': '.jpg', 'image/webp': '.webp', 'image/bmp': '.bmp' };
            const ext = extMap[fmt] || '.png';
            const fileName = baseName + ext;

            let fileHandle = null;
            if (window.showSaveFilePicker) {
                try {
                    const opts = {
                        suggestedName: fileName,
                        types: [{ description: 'Image', accept: { [fmt]: [ext] } }]
                    };
                    if (originalFileHandle) opts.startIn = originalFileHandle;
                    fileHandle = await window.showSaveFilePicker(opts);
                } catch (e) {
                    if (e.name === 'AbortError') return;
                }
            }

            const outW = parseInt(document.getElementById('out-width').value) || workCanvas.width;
            const outH = parseInt(document.getElementById('out-height').value) || workCanvas.height;
            const quality = parseInt(document.getElementById('out-quality').value) / 100;

            const outCanvas = buildOutputCanvas(outW, outH);

            let blob;
            if (fmt === 'image/bmp') {
                blob = encodeBMP(outCanvas);
            } else {
                blob = await new Promise(r => outCanvas.toBlob(r, fmt, quality));
                if (!blob) { alert(I18n.t('image.alertExportFail')); return; }
            }

            if (fileHandle) {
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            }
        }

        function encodeBMP(canvas) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h).data;

            const rowBytes = w * 3;
            const rowPad = (4 - rowBytes % 4) % 4;
            const rowSize = rowBytes + rowPad;
            const pixelDataSize = rowSize * h;
            const fileSize = 54 + pixelDataSize;

            const buf = new ArrayBuffer(fileSize);
            const v = new DataView(buf);

            v.setUint8(0, 0x42); v.setUint8(1, 0x4D);
            v.setUint32(2, fileSize, true);
            v.setUint32(10, 54, true);
            v.setUint32(14, 40, true);
            v.setInt32(18, w, true);
            v.setInt32(22, -h, true);
            v.setUint16(26, 1, true);
            v.setUint16(28, 24, true);
            v.setUint32(30, 0, true);
            v.setUint32(34, pixelDataSize, true);
            v.setUint32(38, 2835, true);
            v.setUint32(42, 2835, true);

            let off = 54;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    v.setUint8(off++, imgData[i + 2]);
                    v.setUint8(off++, imgData[i + 1]);
                    v.setUint8(off++, imgData[i]);
                }
                for (let p = 0; p < rowPad; p++) v.setUint8(off++, 0);
            }

            return new Blob([buf], { type: 'image/bmp' });
        }

        // ================ WINDOW RESIZE ================

        window.addEventListener('resize', () => {
            if (originalImage) drawPreview();
        });
    </script>
    <script>
        (async function () {
            await I18n.init();
            I18n.applyTo(document.body);
            document.title = I18n.t('image.pageTitle');
            window.addEventListener('message', function (e) {
                var d = e.data;
                if (!d || d.type !== I18n.MSG_TYPE) return;
                if (d.lang !== 'en' && d.lang !== 'ru') return;
                I18n.setLang(d.lang);
            });
        })();
    </script>
